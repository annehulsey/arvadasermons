.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

.sg{margin-bottom:10px}

.shdr-left{flex:1;min-width:0}
.shdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

.sarrow{font-size:11px;color:#aaa;transition:transform .2s}
.sarrow.open{transform:rotate(180deg)}
.sbody{display:none;border:1px solid #e8e6e0;border-top:none;border-radius:0 0 9px 9px;background:#fafafa}
.sbody.open{display:block}

.guide-title{font-size:13px;font-weight:600;color:#0F6E56;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.guide-summary{font-size:14px;color:#333;line-height:1.65;margin-bottom:16px}
.guide-section{margin-bottom:14px}
.guide-section-label{font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.guide-questions{list-style:none;padding:0;counter-reset:q}

.guide-questions li:last-child{border-bottom:none}
.guide-questions li::before{content:counter(q);position:absolute;left:0;top:7px;font-size:11px;font-weight:600;color:#534AB7}
.scripture-list{display:flex;flex-direction:column;gap:6px}
.scripture-item{display:flex;gap:10px;align-items:baseline}
.scripture-ref{font-size:12px;font-weight:600;color:#534AB7;white-space:nowrap;min-width:130px}

.sermons-section .card:last-child{margin-bottom:0}

.pginfo{font-size:13px;color:#aaa;margin:0 4px}

ilehighvineyard/Podcast_20180304.mp3?dest-id=94476", "series": "I Am", "year": 2018}, {"date": "", "title": "I Am: Streams of Living Water", "title_url": "http://milehighvineyard.libsyn.com/i-am-streams-of-living-water", "speaker": "", "description": "Streams of Living Water by Eleanor Mumford, John 7:37", "audio_url": "http://traffic.libsyn.com/milehighvineyard/MHV_Podcast_20180225.mp3?dest-id=94476", "series": "I Am", "year": 2018}, {"date": "", "title": "I Am: The Bread of Life", "title_url": "http://milehighvineyard.libsyn.com/i-am-the-bread-of-life", "speaker": "The Bread", "description": "The Bread of Life by Jay Pathak, John 6:35-42", "audio_url": "http://traffic.libsyn.com/milehighvineyard/2-18.mp3?dest-id=94476", "series": "I Am", "year": 2018}, {"date": "", "title": "Rhythms: Remembrance", "title_url": "http://milehighvineyard.libsyn.com/rhythms-remembrance", "speaker": "", "description": "It's such an odd thing to think about creating rhythms of remembering. But the scriptures tell us that it is vital in our lives with God that we create and maintain spaces where we remember what God has done in, through and around us. As week wrap up our series \"Rhythm\" pastor, Jay Pathak, speaks about how we can do this in a&nbsp; way that will keep us refreshed and ready for what God would want us to do next!", "audio_url": "http://traffic.libsyn.com/milehighvineyard/2-11.mp3?dest-id=94476", "series": "Rhythms", "year": 2018}, {"date": "", "title": "Rhythms: Mission", "title_url": "http://milehighvineyard.libsyn.com/rhythms-mission", "speaker": "", "description": "As we free ourselves up in other areas of our lives by living with thoughtful rhythm, we often find ourselves available to join God in bringing His Kingdom to Earth in regular and more frequent ways. This week, Westminster Vineyard pastor, Ben Folman, shares with us how to start living with regular rhythms of being on mission in every place we live, work &amp; play.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/2-4.mp3?dest-id=94476", "series": "Rhythms", "year": 2018}, {"date": "", "title": "Rhythms: Physical Fitness", "title_url": "http://milehighvineyard.libsyn.com/rhythms-physical-fitness", "speaker": "", "description": "When we think about growing in our lives with God we don’t often include our physical bodies. This week founding pastor, Jay Pathak, looks at the importance of creating rhythms and routines around a healthy physical body and the part that plays as we grow to be more like Jesus.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/1-28.mp3?dest-id=94476", "series": "Rhythms", "year": 2018}, {"date": "", "title": "Rhythms: Relationships", "title_url": "http://milehighvineyard.libsyn.com/rhythms-relationships", "speaker": "", "description": "Not a single person on their deathbed looks back over their life and wishes they had spent more time working, or more time on facebook and instagram. This week Arvada Vineyard pastor, Corey Garris, helps us take a look at one of the hardest things to build rhythms around but that the scriptures say life is really all about, relationships.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/1-21.mp3?dest-id=94476", "series": "Rhythms", "year": 2018}, {"date": "", "title": "Rhythms: Solitude", "title_url": "http://milehighvineyard.libsyn.com/rhythms-solitude", "speaker": "", "description": "We all want to live the good life, full of meaning, purpose, beauty, love and joy. But when we live in the fast lane do we really get to experience any of that? This week founding pastor, Jay Pathak examines what the life of Jesus has to show us about creating regular rhythms of slowing down, unplugging and quieting all the distractions so we can truly experience the best kind of life.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/1-14.mp3?dest-id=94476", "series": "Rhythms", "year": 2018}, {"date": "", "title": "Rhythm: Making Space", "title_url": "http://milehighvineyard.libsyn.com/rhythm-making-space", "speaker": "", "description": "Whats your resolutions for this new year? Have you spent some time thinking about what you’re going to do to see those happen? In the frantic, upbeat, busy lives we all live, how does one make time and space to grow and transform? As we start our new sermon series “Rhythm” pastor Jay Pathak speaks about starting the new year out right by seeking first the Kingdom of God and how that might free us up to become the kinds of people we were made to be.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/1-7.mp3?dest-id=94476", "series": "Rhythm", "year": 2018}, {"date": "", "title": "A Thrill Of Hope: The Right Savior", "title_url": "http://milehighvineyard.libsyn.com/a-thrill-of-hope-the-right-savior", "speaker": "", "description": "In a world that seems so confusing and painful even in the midst of celebration the Christmas Story calls out to us and tells of a God who would break in and come for you in Jesus. As we wrap up our series founding pastor, Jay Pathak, shares a special Christmas message that reminds us why Christmas is so special as we celebrate God inserting himself into human history and becoming the world's Thrill Of Hope.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/12-24.mp3?dest-id=94476", "series": "A Thrill Of Hope", "year": 2017}, {"date": "", "title": "A Thrill Of Hope: The Wrong Tribe", "title_url": "http://milehighvineyard.libsyn.com/a-thrill-of-hope-the-wrong-tribe", "speaker": "", "description": "What if God designed the Christmas story in such a way that His son would be despised before people even knew him? That when the people of the day thought of his place of birth they would actually be put off. What if it’s not success and power but humility in which rescue would come? This week as we near the end of our series “A Thrill Of Hope” Discover Church pastor, Preston Ulmer, explores the prophecy that the savior of all would be born intentionally into the wrong tribe.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/12-17.mp3?dest-id=94476", "series": "A Thrill Of Hope", "year": 2017}, {"date": "", "title": "A Thrill Of Hope: The Wrong Place", "title_url": "http://milehighvineyard.libsyn.com/a-thrill-of-hope-the-wrong-place", "speaker": "", "description": "Have you ever wondered if God could have written any story he wanted to why he chose to come as a baby? In weakness and need? Requiring the help of not his own people, but the help from those who oppressed his people? This week in \"A Thrill Of Hope\" Pastor, Jay Pathak, explores how God uses people from the wrong place to help carry on the story that will make all things new again.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/12-10.mp3?dest-id=94476", "series": "A Thrill Of Hope", "year": 2017}, {"date": "", "title": "A Thrill Of Hope: The Wrong Messengers", "title_url": "http://milehighvineyard.libsyn.com/a-thrill-of-hope-the-wrong-messengers", "speaker": "", "description": "You’ve probably heard the Christmas Story a time or two in your life, but have you ever stopped to think about the set up for such a crazy story? Like the wise men… who are these guys? And what would compel them to travel so far just to visit a baby? This week as we begin our Advent series, pastor, Jay Pathak, explores the origins of the Magi and how compelled by “Thrill Of Hope” they set the stage for the Christmas Story.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/12-3.mp3?dest-id=94476", "series": "A Thrill Of Hope", "year": 2017}, {"date": "", "title": "You'll Thank Me Later: Thankful For People", "title_url": "http://milehighvineyard.libsyn.com/youll-thank-me-later-thankful-for-people", "speaker": "", "description": "What are you thankful for this holiday season? Is it the amazing food and drinks? All the fun parties? Or maybe you're thankful for the gifts? This week as we wrap up our series “You’ll Thank Me Later” founding pastor, Jay Pathak, keys in on how to be grateful for what we already have and not just get stuck focusing on what we lack. Especially the people and relationships that surround us.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/11-26.mp3?dest-id=94476", "series": "You'll Thank Me Later", "year": 2017}, {"date": "", "title": "You'll Thank Me Later: Thankful For Provision", "title_url": "http://milehighvineyard.libsyn.com/youll-thank-me-later-thankful-for-provision", "speaker": "", "description": "When it comes to being &amp; feeling wealthy, perception is everything. How you think about your resources will largely determine what you do with them. So why do we all end up feeling more poor than we actaully are? This week Pastor, Jay Pathak uses a talk from the founder of Financial Peace University, Dave Ramsey, to help flip our view of what God has given us and hopefully help us start to see through a lens of gratitude.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/11-19.mp3?dest-id=94476", "series": "You'll Thank Me Later", "year": 2017}, {"date": "", "title": "You'll Thank Me Later: Thankful For Rescue", "title_url": "http://milehighvineyard.libsyn.com/youll-thank-me-later-rescue", "speaker": "", "description": "We are taking the next few weeks leading up to thanksgiving to examine gratitude and how we can be thankful in and out of the holiday season. So this week as we start our new series “You’ll Thank Me Later” pastor, Corey Garris helps us get a glimpse of the most important thing to be grateful for in our lives with God, rescue.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/11-12.mp3?dest-id=94476", "series": "You'll Thank Me Later", "year": 2017}, {"date": "", "title": "I Love My Church: The Hospital of God", "title_url": "http://milehighvineyard.libsyn.com/i-love-my-church-the-army-of-god-0", "speaker": "", "description": "It’s here, the final week of our series “I Love My Church”. This week pastor, Jay Pathak looks towards the mission of God’s people to help find one final analogy to describe what the church is and why it's so important.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/11-5.mp3?dest-id=94476", "series": "I Love My Church", "year": 2017}, {"date": "", "title": "I Love My Church: The Army of God", "title_url": "http://milehighvineyard.libsyn.com/i-love-my-church-the-army-of-god", "speaker": "", "description": "What do you think people are invited into when they decide to follow Jesus and have life with God? Is it a simply a means to live a happy, moral life? Or is it something more? This week in “I Love My Church” pastor, Jay Pathak, takes a look at a different narrative from 2 Timothy and asks the question “When we say yes to Jesus, have we been recruited to an army and are now at war?”", "audio_url": "http://traffic.libsyn.com/milehighvineyard/10-29.mp3?dest-id=94476", "series": "I Love My Church", "year": 2017}, {"date": "", "title": "I Love My Church: The Bride of Christ", "title_url": "http://milehighvineyard.libsyn.com/i-love-my-church-the-bride-of-christ", "speaker": "", "description": "Have you ever been to a wedding and watched as two people vow to give themselves to each other for the rest of their lives? It's a moving, emotional experience right? The bible uses the image of a wedding to describe God's relationship to us pretty often &amp; most of the time it means to draw certain emotions out of us. So what exactly is the scriptures trying to communicate about who God is &amp; what should our response be to that? This week in \"I Love My Church\" pastor, Corey Garris, takes a look at the book of Hosea to answer these questions to help us bring some clarity to this compelling but sometimes confusing imagery.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/10-22.mp3?dest-id=94476", "series": "I Love My Church", "year": 2017}, {"date": "", "title": "I Love My Church: The Family of God", "title_url": "http://milehighvineyard.libsyn.com/i-love-my-church-the-family-of-god", "speaker": "", "description": "When you hear the word \"family\" what do you think of? Your parents? Your spouse? Your kids? Maybe you think of your siblings? No matter who comes to mind, when we hear the phrase \"the family of God\" we all imagine something. While sometimes that can be helpful to how we think about church, often times it actually does the exact opposite. This week in \"I Love My Church\" pastor, Corey Garris, lays out exactly what the bible has to say about the word family &amp; what that means as we live life with those around us.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/10-15.mp3?dest-id=94476", "series": "I Love My Church", "year": 2017}, {"date": "", "title": "I Love My Church: The Temple of God", "title_url": "http://milehighvineyard.libsyn.com/i-love-my-church-the-temple-of-god", "speaker": "", "description": "As a follower of Jesus how do you both live Holy and also engage the culture around you? The scriptures use an interesting analogy when it comes to navigating this tension… the temple. What do these two have to do with each other? Take a listen and find out as pastor, Jay Pathak explains.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/10-8.mp3?dest-id=94476", "series": "I Love My Church", "year": 2017}, {"date": "", "title": "I Love My Church: The Body Of Christ", "title_url": "http://milehighvineyard.libsyn.com/i-love-my-church-the-body-of-christ", "speaker": "", "description": "What do you think it means to be part of a church? We all have different ways to think about this question but one of the most commonly used metaphors to explain what it means to be involved in a church is the human body. This week as we continue in our series I Love My Church, Pastor, Jay Pathak uses the text of Romans 12:1-8 to explain why thinking about the church as a body can be really helpful.", "audio_url": "http://traffic.libsyn.com/milehighvineyard/10-1.mp3?dest-id=94476", "series": "I Love My Church", "year": 2017}, {"date": "", "titl   if(!f.length){$('res').innerHTML='<div id="empty">No results.</div>';return;}
  if(V==='list'){
    const pg=Math.ceil(f.length/PG);if(P>pg)P=1;
    const sl=f.slice((P-1)*PG,P*PG);
    let h=sl.map(card).join('');
    if(pg>1){h+='<div class="pg">';if(P>1)h+=`<button class="btn" onclick="go(${P-1})">&#8592; Prev</button>`;h+=`<span class="pginfo">Page ${P} of ${pg} (${f.length} sermons)</span>`;if(P<pg)h+=`<button class="btn" onclick="go(${P+1})">Next &#8594;</button>`;h+='</div>';}
    $('res').innerHTML=h;
  }else{
    const G={},lone=[];
    f.forEach(s=>{if(s.series){if(!G[s.series])G[s.series]=[];G[s.series].push(s);}else lone.push(s);});
    const sorted=Object.keys(G).sort((a,b)=>G[b].length-G[a].length);
    let h='';
    sorted.forEach((n,i)=>{
      const sg=G[n];
      const guide=GUIDES[n];
      const hasBadge=guide?'<span class="guide-badge">Study Guide</span>':'';
      h+=`<div class="sg">
        <div class="shdr" onclick="tog(${i})" id="sh${i}">
          <div class="shdr-left"><div class="sname">${H(n)}</div><div class="smeta">${sg.length} sermon${sg.length!==1?'s':''}</div></div>
          <div class="shdr-right">${hasBadge}<span class="sarrow" id="sa${i}">&#9660;</span></div>
        </div>
        <div class="sbody" id="sb${i}">
          ${studyGuideHTML(guide)}
          <div class="sermons-section">${sg.map(card).join('')}</div>
        </div>
      </div>`;
    });
    if(lone.length){
      h+=`<div class="sg">
        <div class="shdr" onclick="tog('x')" id="shx">
          <div class="shdr-left"><div class="sname">Stand-alone sermons</div><div class="smeta">${lone.length} sermons</div></div>
          <div class="shdr-right"><span class="sarrow" id="sax">&#9660;</span></div>
        </div>
        <div class="sbody" id="sbx"><div class="sermons-section">${lone.map(card).join('')}</div></div>
      </div>`;
    }
    $('res').innerHTML=h||'<div id="empty">No results.</div>';
  }
}
function tog(id){const b=$('sb'+id),a=$('sa'+id),h=$('sh'+id);const o=b.classList.toggle('open');a.classList.toggle('open',o);h.classList.toggle('open',o);}
function go(p){P=p;render();window.scrollTo(0,0);}
function xcsv(){
  const f=filt();
  const rows=[['Date','Title','Speaker','Series','Description','Audio URL']];
  f.forEach(s=>rows.push([s.date,s.title,s.speaker,s.series,s.description,s.audio_url]));
  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='vineyard-sermons.csv';a.click();
}
</script>
